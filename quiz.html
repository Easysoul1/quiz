<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Basics Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #1e293b;
      line-height: 1.6;
    }

    /* ===== Container ===== */
    .quiz-container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
      padding: 40px 36px;
      max-width: 640px;
      width: 100%;
      transition: opacity 0.2s ease;
    }

    /* ===== Header ===== */
    .quiz-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .quiz-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .quiz-header p {
      font-size: 15px;
      color: #64748b;
      margin-top: 6px;
      font-weight: 400;
    }

    /* ===== Progress Section ===== */
    .progress-section {
      margin-bottom: 28px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 14px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .progress-text .label {
      font-weight: 500;
    }

    .progress-text .score-so-far {
      font-weight: 500;
      color: #0d9488;
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0d9488, #14b8a6);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ===== Question ===== */
    .question-area {
      margin-bottom: 28px;
    }

    .question-number {
      font-size: 13px;
      font-weight: 600;
      color: #0d9488;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.5;
    }

    /* ===== Options ===== */
    .options-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .option-btn {
      display: block;
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      font-family: inherit;
      font-weight: 500;
      text-align: left;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.4;
    }

    .option-btn:hover:not(.disabled) {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .option-btn:focus-visible {
      outline: 3px solid #14b8a6;
      outline-offset: 2px;
    }

    .option-btn.selected {
      border-color: #0d9488;
      background: #f0fdfa;
    }

    .option-btn.correct {
      border-color: #16a34a;
      background: #f0fdf4;
      color: #166534;
    }

    .option-btn.incorrect {
      border-color: #dc2626;
      background: #fef2f2;
      color: #991b1b;
    }

    .option-btn.disabled {
      cursor: default;
      opacity: 0.85;
    }

    .option-btn.disabled:hover {
      background: inherit;
      border-color: inherit;
    }

    .option-btn .option-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-right: 12px;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .option-btn.selected .option-letter {
      background: #0d9488;
      color: #fff;
    }

    .option-btn.correct .option-letter {
      background: #16a34a;
      color: #fff;
    }

    .option-btn.incorrect .option-letter {
      background: #dc2626;
      color: #fff;
    }

    .option-btn .feedback-icon {
      float: right;
      font-size: 18px;
      line-height: 26px;
    }

    /* ===== Feedback Message ===== */
    .feedback-message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
    }

    .feedback-message.show {
      display: block;
    }

    .feedback-message.is-correct {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .feedback-message.is-incorrect {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* ===== Actions ===== */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .error-message {
      font-size: 13px;
      color: #dc2626;
      font-weight: 500;
      flex: 1 1 100%;
      order: 1;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .error-message.show {
      opacity: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 28px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.3;
    }

    .btn:focus-visible {
      outline: 3px solid #14b8a6;
      outline-offset: 2px;
    }

    .btn-primary {
      background: #0d9488;
      color: #ffffff;
      border-color: #0d9488;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0f766e;
      border-color: #0f766e;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #64748b;
      border-color: #cbd5e1;
    }

    .btn-secondary:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
      color: #475569;
    }

    /* ===== Results Screen ===== */
    .results-screen {
      text-align: center;
      display: none;
    }

    .results-screen.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-screen .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
      font-weight: 700;
    }

    .results-screen .score-circle.perfect {
      background: #f0fdf4;
      color: #16a34a;
    }

    .results-screen .score-circle.great {
      background: #f0fdfa;
      color: #0d9488;
    }

    .results-screen .score-circle.good {
      background: #fffbeb;
      color: #d97706;
    }

    .results-screen .score-circle.try-again {
      background: #fef2f2;
      color: #dc2626;
    }

    .results-screen h2 {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .results-screen .score-text {
      font-size: 18px;
      font-weight: 500;
      color: #334155;
      margin-bottom: 8px;
    }

    .results-screen .encouragement {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 32px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    .results-screen .restart-btn {
      margin-top: 4px;
    }

    .results-screen .btn-secondary {
      color: #64748b;
    }

    /* ===== Question Screen ===== */
    .question-screen {
      display: block;
    }

    .question-screen.hidden {
      display: none;
    }

    /* ===== Responsive ===== */
    @media (max-width: 500px) {
      body {
        padding: 16px 12px;
      }

      .quiz-container {
        padding: 28px 20px;
        border-radius: 16px;
      }

      .quiz-header h1 {
        font-size: 22px;
      }

      .quiz-header p {
        font-size: 14px;
      }

      .question-text {
        font-size: 16px;
      }

      .option-btn {
        padding: 13px 14px;
        font-size: 15px;
      }

      .option-btn .option-letter {
        width: 24px;
        height: 24px;
        font-size: 12px;
        margin-right: 10px;
      }

      .btn {
        padding: 11px 22px;
        font-size: 14px;
      }

      .results-screen .score-circle {
        width: 100px;
        height: 100px;
        font-size: 34px;
      }
    }

    @media (max-width: 380px) {
      .quiz-container {
        padding: 20px 14px;
      }

      .actions {
        flex-direction: column;
      }

      .actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="quiz-container" role="main">
    <!-- ===== HEADER ===== -->
    <div class="quiz-header">
      <h1>Python Basics Quiz</h1>
      <p>Test your knowledge on datatypes, calculations, <code>print()</code>, <code>type()</code>, <code>int</code>, <code>float</code>, and <code>str</code>.</p>
    </div>

    <!-- ===== PROGRESS ===== -->
    <div class="progress-section">
      <div class="progress-text">
        <span class="label">Question <span id="current-q-num">1</span> of <span id="total-q-count">8</span></span>
        <span class="score-so-far" id="score-so-far">0 correct</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- ===== QUESTION SCREEN ===== -->
    <div class="question-screen" id="question-screen">
      <div class="question-area">
        <div class="question-number" id="question-number">Question 1</div>
        <p class="question-text" id="question-text"></p>
      </div>

      <ul class="options-list" id="options-list"></ul>

      <div class="feedback-message" id="feedback-message"></div>

      <div class="actions">
        <div class="error-message" id="error-message">Please select an answer before continuing.</div>
        <button class="btn btn-primary" id="next-btn">Next Question</button>
      </div>
    </div>

    <!-- ===== RESULTS SCREEN ===== -->
    <div class="results-screen" id="results-screen">
      <div class="score-circle" id="score-circle">6/8</div>
      <h2 id="results-heading">Great job!</h2>
      <p class="score-text" id="results-score-text">You got 6 out of 8 correct.</p>
      <p class="encouragement" id="results-message">Keep practising — you're getting there!</p>
      <button class="btn btn-secondary restart-btn" id="restart-btn">↻  Try Again</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ============================================================
      //  QUESTIONS
      // ============================================================
      let questions = [
        {
          question: 'Which of the following is a <strong>float</strong> in Python?',
          options: ['"3.14"', '3.14', '3', "'3.14'"],
          correct: 1,
          explanation: '"3.14" and \'3.14\' are strings (str). 3 is an int. 3.14 is a float because it has a decimal point.'
        },
        {
          question: 'What will <code>print(type(10))</code> output?',
          options: ["<code>&lt;class 'int'&gt;</code>", '<code>int</code>', '<code>10</code>', "<code>&lt;class 'float'&gt;</code>"],
          correct: 0,
          explanation: '<code>type(10)</code> returns <code>&lt;class \'int\'&gt;</code>, and <code>print()</code> displays it.'
        },
        {
          question: 'What is the result of <code>float(5)</code>?',
          options: ['5', '5.0', "'5'", 'Error'],
          correct: 1,
          explanation: '<code>float(5)</code> converts the integer 5 into the float 5.0.'
        },
        {
          question: 'Which function converts a value to a <strong>string</strong>?',
          options: ['<code>str()</code>', '<code>string()</code>', '<code>int()</code>', '<code>float()</code>'],
          correct: 0,
          explanation: '<code>str()</code> converts a value to a string. <code>string()</code> does not exist in Python.'
        },
        {
          question: 'What does <code>print(3 + 2 * 4)</code> output?',
          options: ['20', '11', '14', '23'],
          correct: 1,
          explanation: 'Multiplication comes first: <code>2 * 4 = 8</code>, then <code>3 + 8 = 11</code>.'
        },
        {
          question: 'Which data type would store a whole number like <strong>42</strong>?',
          options: ['float', 'str', 'int', 'bool'],
          correct: 2,
          explanation: '<code>int</code> (integer) is used for whole numbers. <code>float</code> is for decimal numbers, and <code>str</code> is for text.'
        },
        {
          question: 'What does <code>type(3.0)</code> return?',
          options: ["<code>&lt;class 'int'&gt;</code>", "<code>&lt;class 'float'&gt;</code>", "<code>&lt;class 'str'&gt;</code>", 'Error'],
          correct: 1,
          explanation: '<code>3.0</code> is a float because it has a decimal point, so <code>type(3.0)</code> returns <code>&lt;class \'float\'&gt;</code>.'
        },
        {
          question: 'Which of the following converts the number <strong>7</strong> to the string <strong>"7"</strong>?',
          options: ['<code>int(7)</code>', '<code>float(7)</code>', '<code>str(7)</code>', '<code>type(7)</code>'],
          correct: 2,
          explanation: '<code>str(7)</code> converts the integer 7 into the string "7".'
        }
      ];

      const totalQuestions = questions.length;
      const LABELS = ['A', 'B', 'C', 'D'];

      // ============================================================
      //  STATE
      // ============================================================
      let currentIndex = 0;
      let score = 0;
      let answered = false;
      let quizEnded = false;

      // Track which questions were answered correctly (for progress)
      let results = new Array(totalQuestions).fill(null); // true = correct, false = incorrect, null = unanswered

      // DOM references
      const questionScreen = document.getElementById('question-screen');
      const resultsScreen = document.getElementById('results-screen');
      const questionNumberEl = document.getElementById('question-number');
      const questionTextEl = document.getElementById('question-text');
      const optionsListEl = document.getElementById('options-list');
      const feedbackMessageEl = document.getElementById('feedback-message');
      const errorMessageEl = document.getElementById('error-message');
      const nextBtn = document.getElementById('next-btn');
      const restartBtn = document.getElementById('restart-btn');
      const currentQNumEl = document.getElementById('current-q-num');
      const totalQCountEl = document.getElementById('total-q-count');
      const progressFillEl = document.getElementById('progress-fill');
      const scoreSoFarEl = document.getElementById('score-so-far');

      // ============================================================
      //  RENDER
      // ============================================================
      function renderQuestion() {
        const q = questions[currentIndex];
        questionNumberEl.textContent = 'Question ' + (currentIndex + 1);
        questionTextEl.innerHTML = q.question;

        // Build options
        optionsListEl.innerHTML = '';
        q.options.forEach(function (opt, idx) {
          const li = document.createElement('li');
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.setAttribute('data-index', idx);
          btn.innerHTML =
            '<span class="option-letter">' + LABELS[idx] + '</span>' +
            '<span class="option-text">' + opt + '</span>';
          btn.addEventListener('click', onOptionClick);
          li.appendChild(btn);
          optionsListEl.appendChild(li);
        });

        // Reset feedback / error state
        feedbackMessageEl.className = 'feedback-message';
        feedbackMessageEl.innerHTML = '';
        errorMessageEl.classList.remove('show');
        answered = false;

        // Update next button text
        if (currentIndex === totalQuestions - 1) {
          nextBtn.textContent = 'See Results';
        } else {
          nextBtn.textContent = 'Next Question';
        }
        nextBtn.disabled = false;

        // Update progress indicator
        updateProgress();
      }

      function updateProgress() {
        currentQNumEl.textContent = currentIndex + 1;
        totalQCountEl.textContent = totalQuestions;
        progressFillEl.style.width = (currentIndex / totalQuestions) * 100 + '%';

        // Count correct so far
        const correctCount = results.filter(function (v) { return v === true; }).length;
        scoreSoFarEl.textContent = correctCount + ' correct';
      }

      // ============================================================
      //  EVENTS
      // ============================================================
      function onOptionClick(e) {
        if (answered) return;

        const btn = e.currentTarget;
        const idx = parseInt(btn.getAttribute('data-index'), 10);
        const q = questions[currentIndex];
        const isCorrect = idx === q.correct;

        // Mark as answered
        answered = true;
        btn.classList.add('selected');

        // Disable all option buttons
        const allOptions = optionsListEl.querySelectorAll('.option-btn');
        allOptions.forEach(function (opt) {
          opt.classList.add('disabled');
        });

        // Highlight correct / incorrect
        allOptions[q.correct].classList.add('correct');
        if (!isCorrect) {
          btn.classList.add('incorrect');
          // Keep selected on the wrong one too
        }

        // Add feedback icons
        allOptions.forEach(function (opt, i) {
          const iconSpan = document.createElement('span');
          iconSpan.className = 'feedback-icon';
          if (i === q.correct) {
            iconSpan.textContent = '✓';
          } else if (i === idx && !isCorrect) {
            iconSpan.textContent = '✗';
          }
          // Only add icon if this option should have one
          if (iconSpan.textContent) {
            // Remove any existing icon first
            const existing = opt.querySelector('.feedback-icon');
            if (existing) existing.remove();
            opt.appendChild(iconSpan);
          }
        });

        // Update score tracking
        if (isCorrect) {
          results[currentIndex] = true;
          score++;
        } else {
          results[currentIndex] = false;
        }

        // Show feedback message
        feedbackMessageEl.className = 'feedback-message show';
        if (isCorrect) {
          feedbackMessageEl.classList.add('is-correct');
          feedbackMessageEl.innerHTML = '<strong>✓ Correct!</strong> ' + q.explanation;
        } else {
          feedbackMessageEl.classList.add('is-incorrect');
          feedbackMessageEl.innerHTML = '<strong>✗ Not quite.</strong> ' + q.explanation;
        }

        // Hide any prior error
        errorMessageEl.classList.remove('show');

        // Update progress score
        updateProgress();
      }

      function onNextClick() {
        if (!answered) {
          errorMessageEl.classList.add('show');
          return;
        }

        errorMessageEl.classList.remove('show');

        if (currentIndex === totalQuestions - 1) {
          showResults();
        } else {
          currentIndex++;
          renderQuestion();
        }
      }

      // ============================================================
      //  RESULTS
      // ============================================================
      function showResults() {
        quizEnded = true;
        questionScreen.classList.add('hidden');
        resultsScreen.classList.add('show');

        const correctCount = results.filter(function (v) { return v === true; }).length;
        const total = totalQuestions;
        const pct = correctCount / total;

        // Score circle
        const circle = document.getElementById('score-circle');
        circle.textContent = correctCount + '/' + total;
        circle.className = 'score-circle';
        if (pct === 1) {
          circle.classList.add('perfect');
        } else if (pct >= 0.75) {
          circle.classList.add('great');
        } else if (pct >= 0.5) {
          circle.classList.add('good');
        } else {
          circle.classList.add('try-again');
        }

        // Heading
        document.getElementById('results-heading').textContent = headingForScore(pct);

        // Score text
        document.getElementById('results-score-text').textContent =
          'You got ' + correctCount + ' out of ' + total + ' correct.';

        // Encouragement
        document.getElementById('results-message').textContent = encouragementForScore(pct);
      }

      function headingForScore(pct) {
        if (pct === 1) return 'Perfect Score!';
        if (pct >= 0.75) return 'Great Job!';
        if (pct >= 0.5) return 'Good Effort!';
        return 'Keep Practising!';
      }

      function encouragementForScore(pct) {
        if (pct === 1) {
          return 'You answered every question correctly. You really know your Python basics! Ready for the next topic?';
        }
        if (pct >= 0.75) {
          return 'You have a solid grasp of Python fundamentals. Review the ones you missed and try again to ace it!';
        }
        if (pct >= 0.5) {
          return 'You\'re on the right track! A bit more practice with the topics you found tricky and you\'ll nail it.';
        }
        return 'Don\'t worry — Python takes practice! Go over datatypes, conversions, and operator precedence, then give it another shot.';
      }

      // ============================================================
      //  RESTART
      // ============================================================
      function restartQuiz() {
        currentIndex = 0;
        score = 0;
        answered = false;
        quizEnded = false;
        results = new Array(totalQuestions).fill(null);

        resultsScreen.classList.remove('show');
        questionScreen.classList.remove('hidden');
        errorMessageEl.classList.remove('show');

        shuffleArray(questions);
        renderQuestion();
      }

      // ============================================================
      //  KEYBOARD SUPPORT
      // ============================================================
      function onKeyDown(e) {
        if (quizEnded) return;

        // Number keys 1-4 for options
        const keyNum = parseInt(e.key, 10);
        if (keyNum >= 1 && keyNum <= 4 && !answered) {
          const allOptions = optionsListEl.querySelectorAll('.option-btn');
          if (allOptions[keyNum - 1]) {
            allOptions[keyNum - 1].click();
          }
          return;
        }

        // Enter or Space for next
        if (e.key === 'Enter' || e.key === ' ') {
          // Only trigger if not clicking on an option button
          if (e.target.tagName !== 'BUTTON' || !e.target.classList.contains('option-btn')) {
            e.preventDefault();
            nextBtn.click();
          }
        }
      }

      // ============================================================
      //  SHUFFLE
      // ============================================================
      function shuffleArray(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }

      // ============================================================
      //  INIT
      // ============================================================
      function init() {
        totalQCountEl.textContent = totalQuestions;
        shuffleArray(questions);
        renderQuestion();

        // Bind events
        nextBtn.addEventListener('click', onNextClick);
        restartBtn.addEventListener('click', restartQuiz);
        document.addEventListener('keydown', onKeyDown);
      }

      init();
    })();
  </script>

</body>
</html>
